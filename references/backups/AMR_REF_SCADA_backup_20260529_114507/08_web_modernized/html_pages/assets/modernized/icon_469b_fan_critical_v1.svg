<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Fan icon modernized critical">
  <defs>
    <linearGradient id="outerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7e7" />
      <stop offset="100%" stop-color="#ffc1c1" />
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4dde8" />
      <stop offset="100%" stop-color="#aeb9c9" />
    </linearGradient>
    <clipPath id="fanDisc">
      <circle cx="48" cy="48" r="35" />

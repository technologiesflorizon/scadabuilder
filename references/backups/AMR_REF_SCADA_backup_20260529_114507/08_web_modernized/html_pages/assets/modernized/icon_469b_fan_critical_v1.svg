  </defs>

  <circle cx="48" cy="48" r="45" fill="url(#outerGrad)" stroke="#a33535" stroke-width="2" />
  <circle cx="48" cy="48" r="37" fill="#ffefef" stroke="#cc4d4d" stroke-width="1.2" />

  <g clip-path="url(#fanDisc)" fill="url(#bladeGrad)" stroke="#7d8ca0" stroke-width="1">
    <ellipse cx="48" cy="28" rx="7.5" ry="22" />
    <ellipse cx="48" cy="28" rx="7.5" ry="22" transform="rotate(60 48 48)" />
    <ellipse cx="48" cy="28" rx="7.5" ry="22" transform="rotate(120 48 48)" />
    <ellipse cx="48" cy="28" rx="7.5" ry="22" transform="rotate(180 48 48)" />
    <ellipse cx="48" cy="28" rx="7.5" ry="22" transform="rotate(240 48 48)" />
    <ellipse cx="48" cy="28" rx="7.5" ry="22" transform="rotate(300 48 48)" />
  </g>

  <circle cx="48" cy="48" r="10" fill="#cdd6e2" stroke="#74859a" stroke-width="1.2" />
  <circle cx="48" cy="48" r="3" fill="#8fa1b6" />
